<!doctype html>
<html lang="zh-CN" data-theme="pptter">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>PPTTER Zero Trust</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script defer src="/static/js/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="app-frame">

      <!-- 图标侧栏 -->
      <aside class="icon-sidebar">
        <button id="btn-profile" class="btn btn-circle btn-ghost sidebar-action profile-action" type="button" title="我的设置">
          <span id="self-avatar" class="self-avatar">我</span>
        </button>
        <div class="sidebar-spacer"></div>
        <button id="btn-reconnect" class="btn btn-circle btn-ghost sidebar-action" type="button" title="重新连接（重置身份）">
          <svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 5v4h4"></path><path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4"></path>
          </svg>
        </button>
      </aside>

      <!-- 会话列表：群聊 + 联系人（常驻） -->
      <section class="convo-panel">
        <div class="convo-heading">会话与成员</div>
        <ul id="convo-list" class="menu convo-list scroll-thin"></ul>
      </section>

      <!-- 聊天主区 -->
      <main class="chat-main">
        <header class="navbar chat-topbar">
          <div class="chat-title-wrap">
            <h1 id="convo-title" class="chat-title">群聊</h1>
            <p class="status-line">
              <span id="status-dot" class="status-dot bg-warning"></span>
              <span id="status-text" class="status-text">初始化</span>
            </p>
          </div>
          <button id="btn-theme" class="btn btn-circle btn-ghost theme-button" type="button" title="切换深色模式">
            <svg id="theme-icon" class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"></svg>
          </button>
        </header>

        <section id="messages" class="messages-pane scroll-thin" aria-live="polite"></section>

        <form id="msg-form" class="composer">
          <input type="file" id="file-input" accept="image/*" class="hidden">
          <button id="btn-image" type="button" class="btn btn-circle btn-ghost composer-icon-btn" title="发送图片">
            <svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <path d="M21 15l-5-5L5 21"></path>
            </svg>
          </button>
          <input id="msg-input" class="input glass-input composer-input" maxlength="1200" autocomplete="off" spellcheck="false" placeholder="输入消息，本地加密后发送" disabled>
          <button id="send-btn" class="btn btn-primary composer-send" type="submit" disabled>发送</button>
        </form>
      </main>

    </div>
  </div>

  <!-- 设置弹窗：提示音 / 背景图 -->
  <div id="settings" class="modal-backdrop hidden">
    <div class="card settings-card">
      <div class="card-body settings-body">
        <div class="settings-head">
          <h2 class="settings-title">我的设置</h2>
          <button id="settings-close" class="btn btn-sm btn-circle btn-ghost" type="button">✕</button>
        </div>
        <label class="settings-label">
          <span>新消息提示音</span>
          <input id="set-sound" type="checkbox" class="toggle toggle-primary" checked>
        </label>
        <div class="settings-stack">
          <span class="text-sm">聊天背景图（仅本机，不上传）</span>
          <div class="settings-row">
            <input id="set-bg" type="file" accept="image/*" class="file-input file-input-sm settings-file">
            <button id="bg-reset" class="btn btn-sm" type="button">恢复默认</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 图片灯箱 -->
  <div id="lightbox" class="lightbox hidden">
    <img id="lightbox-img" class="lightbox-image" alt="图片预览">
  </div>

  <div id="toast" class="toast toast-top toast-center toast-layer hidden">
    <div id="toast-text" class="alert shadow-lg"></div>
  </div>
</body>
</html>
