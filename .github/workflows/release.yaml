# .github/workflows/release.yaml

on:
  push: # 每次 push 的时候触发
  workflow_dispatch:

name: Build Release
permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/') # 只有这次 Commit 是 创建 Tag 时，才进行后续发布操作
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # checkout 代码
      - uses: actions/setup-node@v4 # 配置 Node 环境
        with:
          node-version: "lts/*"
      - run: npm install && npm run build:css # 重新生成内嵌 CSS
      - uses: actions/setup-go@v5 # 配置 Go 环境
        with:
          go-version: "1.26" # 改成自己的版本
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o pptter_linux_amd64 ./cmd/server # 这 4 条是交叉编译 Go 的指令，酌情修改。
      - run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o pptter_windows_amd64.exe ./cmd/server
      - run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o pptter_mac_amd64 ./cmd/server
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=arm go build -ldflags="-s -w" -o pptter_linux_arm ./cmd/server
      #- run: CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o pptter_windows_arm64.exe ./cmd/server
      #- run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o pptter_mac_arm64 ./cmd/server
      #- run: zip pptter-windows-amd64.zip pptter_windows_amd64.exe key.key crt.crt
      #- run: zip pptter-linux-amd64.zip pptter_linux_amd64 key.key crt.crt
      #- run: zip pptter-mac-amd64.zip pptter_mac_amd64 key.key crt.crt
      #- run: zip pptter-linux-arm.zip pptter_linux_arm key.key crt.crt
      #- run: zip pptter-windows-arm64.zip pptter_windows_arm64.exe key.key crt.crt
      #- run: zip pptter-mac-arm64.zip pptter_mac_arm64 key.key crt.crt

      - name: Release
        uses: softprops/action-gh-release@v1
        with: # 将下述可执行文件 release 上去
          files: |
            pptter_windows_amd64.exe
            pptter_linux_amd64
            pptter_mac_amd64
            pptter_linux_arm
